{% extends 'base.html' %}

{% block content %}
<style>
  .tbl-header-cell {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #94a3b8;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #f1f5f9;
    white-space: nowrap;
    background: #f8fafc;
  }
  .tbl-header-cell:first-child { padding-left: 1.5rem; }
  .tbl-header-cell:last-child  { padding-right: 1.5rem; text-align: right; }

  .tbl-cell {
    padding: 0.9rem 1rem;
    vertical-align: middle;
    border-bottom: 1px solid #f8fafc;
    font-size: 0.88rem;
    color: #1e293b;
  }
  .tbl-cell:first-child { padding-left: 1.5rem; }
  .tbl-cell:last-child  { padding-right: 1.5rem; text-align: right; }

  .tbl-row:hover { background: #f8fafc; }
  .tbl-row:last-child .tbl-cell { border-bottom: none; }

  .btn-edit {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 0.3rem 0.7rem;
    font-size: 0.78rem; font-weight: 500;
    color: #92400e; background: #fffbeb;
    border: 1px solid #fde68a; border-radius: 7px;
    text-decoration: none; transition: background 0.15s;
  }
  .btn-edit:hover { background: #fef3c7; color: #78350f; }

  .btn-del {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 0.3rem 0.7rem;
    font-size: 0.78rem; font-weight: 500;
    color: #991b1b; background: #fff5f5;
    border: 1px solid #fecaca; border-radius: 7px;
    text-decoration: none; transition: background 0.15s;
  }
  .btn-del:hover { background: #fee2e2; color: #7f1d1d; }

  .empty-state { text-align: center; padding: 3.5rem 1rem; }
  .empty-icon {
    width: 48px; height: 48px;
    margin: 0 auto 0.75rem;
    background: #f1f5f9; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .empty-icon svg { width: 22px; height: 22px; stroke: #94a3b8; }

  {% block extra_styles %}{% endblock %}
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h5 class="mb-0 fw-semibold text-dark">{% block list_title %}Listado{% endblock %}</h5>
    <small class="text-muted">{% block list_subtitle %}{% endblock %}</small>
  </div>
  <a href="{% block create_url %}#{% endblock %}" class="btn btn-primary d-flex align-items-center gap-2">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    {% block create_label %}Nuevo{% endblock %}
  </a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table mb-0" style="width:100%; border-collapse:collapse;">
        <thead>
          <tr>
            {% block table_headers %}{% endblock %}
          </tr>
        </thead>
        <tbody>
          {% block table_rows %}{% endblock %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
