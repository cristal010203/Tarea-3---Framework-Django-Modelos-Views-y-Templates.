{% extends 'base.html' %}
{% block title %}Eliminar Curso{% endblock %}
{% block page_title %}Confirmar Eliminación{% endblock %}
{% block content %}
<div class="container mt-3">
    <p>¿Estás seguro de que deseas eliminar el curso <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'curso:list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
