{% extends 'base.html' %}
{% block title %}Eliminar Nota{% endblock %}
{% block page_title %}Confirmar Eliminación{% endblock %}
{% block content %}
<div class="container mt-3">
    <p>¿Estás seguro de que deseas eliminar la nota de <strong>{{ object.alumno }}</strong> en el curso <strong>{{ object.curso }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'notas:list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
