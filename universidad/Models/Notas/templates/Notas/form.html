{% extends 'base.html' %}
{% block title %}Notas{% endblock %}
{% block page_title %}Formulario de Nota{% endblock %}
{% block content %}
<div class="container mt-3">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'notas:list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
